<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Photo Gallery</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #f4f4f4;
        text-align: center;
    }

    header {
        background-color: #222;
        color: white;
        padding: 1rem;
    }

    main {
        padding: 20px;
    }

    #displayed-image {
        width: 60%;
        max-width: 600px;
        height: auto;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        margin-bottom: 10px;
    }

    #image-description {
        font-size: 1.1rem;
        margin-bottom: 20px;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 10px;
        max-width: 800px;
        margin: auto;
    }

    .gallery img {
        width: 100%;
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.3s ease;
    }

    .gallery img:hover,
    .gallery img:focus {
        transform: scale(1.05);
        outline: 3px solid #555;
    }

    footer {
        background-color: #222;
        color: white;
        padding: 10px;
        margin-top: 20px;
    }
</style>
</head>

<body>

<header>
    <h1>Interactive Photo Gallery</h1>
    <p>Click or press Enter on an image to display it above.</p>
</header>

<main>
    <section>
        <img id="displayed-image" src="https://via.placeholder.com/600x400?text=Select+an+Image" alt="Large display area">
        <p id="image-description">Image description will appear here.</p>
    </section>

    <section class="gallery">
        <img src="https://via.placeholder.com/150/FF5733/FFFFFF?text=Nature"
             alt="Beautiful forest landscape"
             tabindex="0"
             onclick="showImage(this)"
             onkeypress="handleKey(event, this)">

        <img src="https://via.placeholder.com/150/33A1FF/FFFFFF?text=Ocean"
             alt="Calm ocean view at sunset"
             tabindex="0"
             onclick="showImage(this)"
             onkeypress="handleKey(event, this)">

        <img src="https://via.placeholder.com/150/8D33FF/FFFFFF?text=Mountains"
             alt="Snowy mountain peaks"
             tabindex="0"
             onclick="showImage(this)"
             onkeypress="handleKey(event, this)">

        <img src="https://via.placeholder.com/150/33FF57/FFFFFF?text=City"
             alt="Modern city skyline at night"
             tabindex="0"
             onclick="showImage(this)"
             onkeypress="handleKey(event, this)">
    </section>
</main>

<footer>
    <p>&copy; 2026 Interactive Gallery Project</p>
</footer>

<script>
function showImage(img) {
    const displayedImage = document.getElementById("displayed-image");
    const description = document.getElementById("image-description");

    displayedImage.src = img.src.replace("150", "600x400");
    displayedImage.alt = img.alt;
    description.textContent = img.alt;
}

function handleKey(event, img) {
    if (event.key === "Enter") {
        showImage(img);
    }
}
</script>

</body>
</html>
